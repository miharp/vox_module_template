---
_subdirectory: template
_min_copier_version: "9.0.0"

# Load module_name (and other answers) from the existing .copier-answers.yml
# so the user doesn't have to re-enter them.
_external_data:
  answers: .copier-answers.yml

_message_after_copy: |
  Class '{{ answers.module_name }}::{{ subclass_name }}' scaffolded!

  Add to manifests/init.pp:

    # 1. New parameter in the class signature:
    Boolean $manage_{{ subclass_name }} = true,

    # 2. Contain the new class:
    contain {{ answers.module_name }}::{{ subclass_name }}

    # 3. Insert into the ordering chain at the right position:
    -> Class['{{ answers.module_name }}::{{ subclass_name }}']

  Add the default to data/common.yaml:

    {{ answers.module_name }}::manage_{{ subclass_name }}: true

subclass_name:
  type: str
  help: "Name of the new subclass (e.g. 'vhosts', 'repo')"
  placeholder: "vhosts"
  validator: >-
    {% if not (subclass_name | regex_search('^[a-z][a-z0-9_]*$')) %}
    Subclass name must be lowercase letters, numbers, and underscores, starting with a letter.
    {% endif %}
